<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BiliParty - 一起看</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #controls {
      background: #ffe0f0; padding: 15px; display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid #ff69b4;
    }
    button {
      padding: 8px 16px; background: #ff69b4; color: white; border: none;
      border-radius: 20px; cursor: pointer; font-weight: bold;
    }
    input { padding: 6px 10px; border-radius: 10px; border: 1px solid #ff69b4; }
    #roomIdDisplay { font-weight: bold; color: #d04; }
    #status { margin-left: auto; color: #888; }
    webview { flex: 1; border: none; }
  </style>
</head>
<body>
  <div id="controls">
    <button id="btnHost">喵～开房间</button>
    <span id="hostInfo" style="display:none;">
      房间号：<span id="roomIdDisplay"></span>
      <button id="btnCopy">复制</button>
      <button id="btnDisconnect">断开</button>
    </span>
    <span id="guestInfo">
      <input id="roomInput" placeholder="输入房间号..." />
      <button id="btnJoin">上车喵</button>
    </span>
    <span id="status">未连接</span>
  </div>
  <webview id="biliWebview" src="about:blank" preload="./preload/bili-hijack.js"></webview>

  <script src="index.js"></script>
</body>
</html>
